    <g transform="translate(20,60)" font-size="11">
      <text fill="#9ca3af">Range</text>
      <rect x="80" y="-12" width="60" height="24" rx="5" fill="#0f1419" stroke="#2a3142"/><text x="110" y="5" text-anchor="middle" fill="#e5e7eb" font-weight="600">08:50</text>
