      <rect x="170" y="-12" width="60" height="24" rx="5" fill="#0f1419" stroke="#2a3142"/><text x="200" y="5" text-anchor="middle" fill="#e5e7eb" font-weight="600">09:00</text>

      <text y="28">Entry</text>
