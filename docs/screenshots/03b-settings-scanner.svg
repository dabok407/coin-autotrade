  <text x="640" y="740" text-anchor="middle" font-size="13" fill="#9ca3af" font-style="italic">스캐너별 독립 설정 — 시간대/TP/SL/Trail/Split/TOP-N 을 스캐너마다 개별 튜닝</text>
