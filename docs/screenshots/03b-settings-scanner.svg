      <text y="40" x="650" fill="#9ca3af">Range SL (2연속)</text>
      <rect x="770" y="28" width="48" height="24" rx="12" fill="#22c55e"/><circle cx="806" cy="40" r="9" fill="#fff"/>

      <text y="40" x="880" fill="#9ca3af">Quick TP</text>
      <rect x="960" y="28" width="48" height="24" rx="12" fill="#374151"/><circle cx="972" cy="40" r="9" fill="#6b7280"/>
      <text y="40" x="1016" fill="#6b7280">제거</text>

      <!-- Info panel -->
      <rect x="0" y="68" width="1192" height="72" rx="6" fill="#1e1b3a" stroke="#4c1d95"/>
      <text x="14" y="88" font-size="11" fill="#a5b4fc" font-weight="700">💡 Overnight Session 설계</text>
      <text x="14" y="108" font-size="11" fill="#c4b5fd">session_end=08:59 은 익일 08:59 를 의미 (isOvernightSession = sessionEnd &lt; 12:00 분기 활성)</text>
      <text x="14" y="124" font-size="11" fill="#c4b5fd">23:58 매수 → 23:59 캔들에서 즉시 HC_SESSION_END 강제청산되는 1분 수명 문제 회피</text>
    </g>
