      <text x="150" y="31" fill="#6b7280">→</text>
      <rect x="170" y="16" width="60" height="24" rx="5" fill="#0f1419" stroke="#2a3142"/><text x="200" y="33" text-anchor="middle" fill="#4ade80" font-weight="600">09:05</text>

