<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Upbit AutoTrade - Settings</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0%25' stop-color='%232b76ff'/%3E%3Cstop offset='100%25' stop-color='%2320c997'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='32' height='32' rx='6' fill='url(%23g)'/%3E%3Cpath d='M8 22 L14 12 L18 17 L24 8' stroke='white' stroke-width='2.5' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3Ccircle cx='24' cy='8' r='2.5' fill='white'/%3E%3C/svg%3E"/>
  <link rel="stylesheet" th:href="@{/css/autotrade.css(v=20260314b)}">
</head>
<body>

<div class="toast-container" id="toastContainer"></div>

<div class="container">

  <!-- ═══════ HEADER ═══════ -->
  <div class="header">
    <div class="brand">
      <h1>
        <svg width="24" height="24" viewBox="0 0 32 32" style="vertical-align:middle;margin-right:8px">
          <defs><linearGradient id="hg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#2b76ff"/><stop offset="100%" stop-color="#20c997"/></linearGradient></defs>
          <rect width="32" height="32" rx="6" fill="url(#hg)"/>
          <path d="M8 22 L14 12 L18 17 L24 8" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="24" cy="8" r="2.5" fill="white"/>
        </svg>
        Upbit AutoTrade
      </h1>
      <div class="tabs">
        <a class="tab" th:href="@{/dashboard}">
          <svg class="tab-icon" viewBox="0 0 20 20" fill="currentColor"><path d="M3 4a1 1 0 011-1h12a1 1 0 011 1v2a1 1 0 01-1 1H4a1 1 0 01-1-1V4zm0 6a1 1 0 011-1h6a1 1 0 011 1v6a1 1 0 01-1 1H4a1 1 0 01-1-1v-6zm10 0a1 1 0 011-1h2a1 1 0 011 1v6a1 1 0 01-1 1h-2a1 1 0 01-1-1v-6z"/></svg>
          Dashboard
        </a>
        <a class="tab active" th:href="@{/settings}">
          <svg class="tab-icon" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M11.49 3.17c-.38-1.56-2.6-1.56-2.98 0a1.532 1.532 0 01-2.286.948c-1.372-.836-2.942.734-2.106 2.106.54.886.061 2.042-.947 2.287-1.561.379-1.561 2.6 0 2.978a1.532 1.532 0 01.947 2.287c-.836 1.372.734 2.942 2.106 2.106a1.532 1.532 0 012.287.947c.379 1.561 2.6 1.561 2.978 0a1.533 1.533 0 012.287-.947c1.372.836 2.942-.734 2.106-2.106a1.533 1.533 0 01.947-2.287c1.561-.379 1.561-2.6 0-2.978a1.532 1.532 0 01-.947-2.287c.836-1.372-.734-2.942-2.106-2.106a1.532 1.532 0 01-2.287-.947zM10 13a3 3 0 100-6 3 3 0 000 6z" clip-rule="evenodd"/></svg>
          Settings
        </a>
        <a class="tab" th:href="@{/backtest}">
          <svg class="tab-icon" viewBox="0 0 20 20" fill="currentColor"><path d="M2 11a1 1 0 011-1h2a1 1 0 011 1v5a1 1 0 01-1 1H3a1 1 0 01-1-1v-5zm6-4a1 1 0 011-1h2a1 1 0 011 1v9a1 1 0 01-1 1H9a1 1 0 01-1-1V7zm6-3a1 1 0 011-1h2a1 1 0 011 1v12a1 1 0 01-1 1h-2a1 1 0 01-1-1V4z"/></svg>
          Backtest
        </a>
      </div>
    </div>
    <div class="nav">
      <button class="pill small" id="refreshBtn" type="button" title="Refresh" onclick="location.reload()">
        <svg width="14" height="14" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M4 2a1 1 0 011 1v2.101a7.002 7.002 0 0111.601 2.566 1 1 0 11-1.885.666A5.002 5.002 0 005.999 7H9a1 1 0 010 2H4a1 1 0 01-1-1V3a1 1 0 011-1zm.008 9.057a1 1 0 011.276.61A5.002 5.002 0 0014.001 13H11a1 1 0 110-2h5a1 1 0 011 1v5a1 1 0 11-2 0v-2.101a7.002 7.002 0 01-11.601-2.566 1 1 0 01.61-1.276z" clip-rule="evenodd"/></svg>
        Refresh
      </button>
      <button class="pill small" id="themeToggle" type="button" aria-pressed="false">Dark</button>
      <button class="pill small" id="logoutBtn" type="button" style="color:var(--danger)">Logout</button>
    </div>
  </div>

  <!-- ── Global Settings Card ── -->
  <div class="card">
    <div class="card-header">
      <h2 class="card-title">Global Settings</h2>
    </div>
    <div class="toolbar">
      <div class="field">
        <label>Mode <span class="help-icon" data-tooltip="PAPER: &#xbaa8;&#xc758;&#xd22c;&#xc790; &#xbaa8;&#xb4dc; (&#xc2e4;&#xc81c; &#xc8fc;&#xbb38; &#xc5c6;&#xc74c;, &#xc2ac;&#xb9ac;&#xd53c;&#xc9c0; 0.1% + &#xc218;&#xc218;&#xb8cc; 0.05% &#xc2dc;&#xbbac;&#xb808;&#xc774;&#xc158;)&#10;LIVE: &#xc2e4;&#xac70;&#xb798; &#xbaa8;&#xb4dc; (&#xc2e4;&#xc81c; &#xc5c5;&#xbe44;&#xd2b8; &#xc8fc;&#xbb38; &#xc2e4;&#xd589;)" aria-label="Mode help"></span></label>
        <div class="select-wrap">
          <select class="select" id="mode">
            <option value="PAPER" selected>PAPER</option>
            <option value="LIVE">LIVE</option>
          </select>
        </div>
      </div>
      <div class="field">
        <label>Capital (KRW) <span class="help-icon" data-tooltip="&#xc790;&#xb3d9;&#xb9e4;&#xb9e4;&#xc5d0; &#xc0ac;&#xc6a9;&#xd560; &#xcd1d; &#xc790;&#xbcf8;&#xae08;(&#xc6d0;&#xd654;)&#xc785;&#xb2c8;&#xb2e4;.&#10;PCT &#xc8fc;&#xbb38; &#xbaa8;&#xb4dc;&#xc5d0;&#xc11c; &#xc774; &#xac12;&#xc758; &#xbe44;&#xc728;&#xb9cc;&#xd07c; &#xc8fc;&#xbb38;&#xd569;&#xb2c8;&#xb2e4;." aria-label="Capital help"></span></label>
        <input class="input" type="text" id="capital" value="100,000"/>
      </div>
      <div class="field" style="min-width:200px">
        <label class="label-row">API Key <span class="help-icon" data-tooltip="&#xc5c5;&#xbe44;&#xd2b8; API &#xd0a4; &#xc5f0;&#xacb0; &#xc0c1;&#xd0dc;&#xb97c; &#xd14c;&#xc2a4;&#xd2b8;&#xd569;&#xb2c8;&#xb2e4;.&#10;LIVE &#xbaa8;&#xb4dc; &#xc0ac;&#xc6a9; &#xc2dc; API &#xd0a4;&#xac00; &#xd544;&#xc694;&#xd569;&#xb2c8;&#xb2e4;." aria-label="API Key help"></span></label>
        <div style="display:flex;align-items:center;gap:8px;height:42px">
          <button class="btn" id="apiTestBtn" style="font-size:12px;padding:6px 12px;white-space:nowrap">API Test</button>
        </div>
      </div>
    </div>
    <div id="apiTestResult" style="display:none;margin-top:10px;padding:12px 16px;border-radius:10px;border:1px solid var(--border);font-size:13px;line-height:1.6;white-space:pre-wrap"></div>
  </div>

  <!-- ── Strategy Groups ── -->
  <div class="card">
    <div class="card-header" style="display:flex;align-items:center;justify-content:space-between;gap:8px">
      <h2 class="card-title" style="margin:0">Strategy Groups <span class="help-icon" data-tooltip="Strategy Groups: Different coin groups can have independent strategy/risk settings.&#10;&#10;Each group sets its own markets, strategies, TP/SL, interval, and other parameters.&#10;A market can only belong to one group (mutual exclusion).&#10;&#10;Example:&#10;- Group 1: SOL+ETH with EMA_RSI_TREND, TP3/SL2, minConf 8&#10;- Group 2: BTC+ADA with REGIME_PULLBACK, TP3/SL2, minConf 6" aria-label="Strategy groups help"></span></h2>
      <button class="btn primary" id="addGroupBtn" type="button" style="font-size:13px;padding:6px 16px">+ &#xadf8;&#xb8f9; &#xcd94;&#xac00;</button>
    </div>
    <div id="groupsContainer">
      <!-- Group cards will be rendered here by JS -->
    </div>
  </div>

  <!-- ── Actions ── -->
  <div class="card" style="text-align:center">
    <button class="btn primary btn-apply" id="applyBtn">Apply</button>
  </div>

</div><!-- /.container -->

<!-- Strategy descriptions modal (? icon) -->
<div class="modal" id="strategyModal" aria-hidden="true">
  <div class="modal-backdrop" data-modal-close></div>
  <div class="modal-dialog" role="dialog" aria-modal="true" aria-labelledby="strategyModalTitle">
    <div class="modal-header">
      <div class="modal-title" id="strategyModalTitle">Strategy Descriptions</div>
      <button type="button" class="modal-close" aria-label="Close" data-modal-close>&times;</button>
    </div>
    <div class="modal-body" id="strategyModalBody"></div>
  </div>
</div>

<!-- Strategy detail settings modal (&#x2699; icon) -->
<div class="modal" id="stratDetailModal" aria-hidden="true">
  <div class="modal-backdrop" data-modal-close></div>
  <div class="modal-dialog" role="dialog" aria-modal="true" aria-labelledby="stratDetailTitle" style="max-width:600px">
    <div class="modal-header">
      <div class="modal-title" id="stratDetailTitle">&#x2699; &#xc804;&#xb7b5; &#xc0c1;&#xc138; &#xc124;&#xc815;</div>
      <button type="button" class="modal-close" aria-label="Close" data-modal-close>&times;</button>
    </div>
    <div class="modal-body" id="stratDetailBody"></div>
    <div style="padding:12px 20px 16px;text-align:right;border-top:1px solid var(--border)">
      <button class="btn primary" id="sdSaveBtn" style="font-size:13px;padding:8px 24px">&#xc800;&#xc7a5;</button>
    </div>
  </div>
</div>

<script th:src="@{/js/autotrade-common.js(v=20260314b)}"></script>
<script th:src="@{/js/settings.js(v=20260314b)}"></script>
</body>
</html>
