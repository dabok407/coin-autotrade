<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Upbit AutoTrade - Settings</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0%25' stop-color='%232b76ff'/%3E%3Cstop offset='100%25' stop-color='%2320c997'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='32' height='32' rx='6' fill='url(%23g)'/%3E%3Cpath d='M8 22 L14 12 L18 17 L24 8' stroke='white' stroke-width='2.5' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3Ccircle cx='24' cy='8' r='2.5' fill='white'/%3E%3C/svg%3E"/>
  <link rel="stylesheet" th:href="@{/css/autotrade.css(v=20260316a)}">
</head>
<body>

<div class="toast-container" id="toastContainer"></div>

<!-- ═══════ Header ═══════ -->
<header class="header">
  <div class="header-left">
    <a class="logo" th:href="@{/dashboard}">
      <div class="logo-icon">
        <svg width="16" height="16" viewBox="0 0 32 32">
          <path d="M8 22 L14 12 L18 17 L24 8" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="24" cy="8" r="2.5" fill="white"/>
        </svg>
      </div>
      <span>Upbit AutoTrade</span>
    </a>
    <nav class="nav-tabs">
      <a class="nav-tab" th:href="@{/dashboard}">&#x1F4CA; 대시보드</a>
      <a class="nav-tab active" th:href="@{/settings}">&#x2699;&#xFE0F; 설정</a>
      <a class="nav-tab" th:href="@{/backtest}">&#x1F9EA; 백테스트</a>
    </nav>
  </div>
  <div class="header-right">
    <button class="header-btn" id="refreshBtn" title="Refresh" onclick="location.reload()">&#x21bb;</button>
    <button class="header-btn" id="themeToggle" title="Theme">&#x263e;</button>
    <button class="header-btn" id="logoutBtn" title="Logout" style="color:var(--danger)">&#x23fb;</button>
  </div>
</header>

<main class="page">
  <div class="container">
    <h1 class="page-title">Settings</h1>
    <p class="page-desc">봇 모드, 자본금, 전략 그룹 등 자동매매 설정을 관리합니다.</p>

    <!-- ── Global Settings Card ── -->
    <div class="card" style="margin-bottom:24px">
      <div class="card-header">
        <div class="card-title">
          <div class="card-icon" style="background:var(--primary-glow);color:var(--primary);">&#x2699;</div>
          Global Settings
        </div>
      </div>
      <div class="config-bar" style="grid-template-columns:1fr 1fr 1fr">
        <div class="config-field">
          <label>Mode <span class="help-icon" data-tooltip="PAPER: 모의투자 모드 (실제 주문 없음, 슬리피지 0.1% + 수수료 0.05% 시뮬레이션)&#10;LIVE: 실거래 모드 (실제 업비트 주문 실행)" aria-label="Mode help"></span></label>
          <div class="select-wrap">
            <select class="select" id="mode">
              <option value="PAPER" selected>PAPER</option>
              <option value="LIVE">LIVE</option>
            </select>
          </div>
        </div>
        <div class="config-field">
          <label>Capital (KRW) <span class="help-icon" data-tooltip="자동매매에 사용할 총 자본금(원화)입니다.&#10;PCT 주문 모드에서 이 값의 비율만큼 주문합니다." aria-label="Capital help"></span></label>
          <input class="input" type="text" id="capital" value="100,000"/>
        </div>
        <div class="config-field">
          <label>API Key <span class="help-icon" data-tooltip="업비트 API 키 연결 상태를 테스트합니다.&#10;LIVE 모드 사용 시 API 키가 필요합니다." aria-label="API Key help"></span></label>
          <div style="display:flex;align-items:center;gap:8px;margin-top:2px">
            <button class="btn primary" id="apiTestBtn" style="font-size:12px;padding:8px 16px;white-space:nowrap">API Test</button>
          </div>
        </div>
      </div>
      <div id="apiTestResult" style="display:none;margin-top:12px;padding:12px 16px;border-radius:8px;border:1px solid var(--border);font-size:13px;line-height:1.6;white-space:pre-wrap;background:rgba(0,0,0,0.15)"></div>
    </div>

    <!-- ── Strategy Groups ── -->
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <div style="font-size:15px;font-weight:600;display:flex;align-items:center;gap:8px">
        Strategy Groups
        <span class="help-icon" data-tooltip="Strategy Groups: 코인 그룹별로 독립적인 전략/리스크 설정이 가능합니다.&#10;&#10;각 그룹은 자체 마켓, 전략, TP/SL, 인터벌 등을 설정합니다.&#10;마켓은 하나의 그룹에만 소속 가능합니다 (상호 배제).&#10;&#10;예시:&#10;- Group 1: SOL+ETH with EMA_RSI_TREND, TP3/SL2, minConf 8&#10;- Group 2: BTC+ADA with REGIME_PULLBACK, TP3/SL2, minConf 6" aria-label="Strategy groups help"></span>
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn" id="importFromBt" type="button" style="font-size:12px;padding:6px 12px;background:rgba(43,118,255,.12);border:1px solid rgba(43,118,255,.3);color:var(--primary);border-radius:8px;cursor:pointer">&#x1F4E5; 백테스트에서 불러오기</button>
        <button class="btn primary" id="addGroupBtn" type="button" style="font-size:12px;padding:6px 16px">+ 그룹 추가</button>
      </div>
    </div>
    <div class="strategy-groups" id="groupsContainer">
      <!-- Group cards rendered by JS -->
    </div>

    <!-- ── Opening Scanner Settings ── -->
    <div class="card" style="margin-top:32px;margin-bottom:24px">
      <div class="card-header" style="display:flex;align-items:center;justify-content:space-between">
        <div class="card-title">
          <div class="card-icon" style="background:rgba(255,165,0,.15);color:#ffa500">&#x1F305;</div>
          Opening Scanner Settings
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <span style="font-size:12px;color:var(--text-muted)">Enabled</span>
          <button class="bot-toggle" id="scannerEnabledToggle" aria-pressed="false" style="width:100px">
            <span class="bot-toggle-knob"></span>
            <span class="bot-toggle-label">OFF</span>
          </button>
        </div>
      </div>

      <div style="padding:16px 20px">
        <!-- Row 1: Mode, Capital, Order Sizing -->
        <div class="config-bar" style="grid-template-columns:1fr 1fr 1fr 1fr;margin-bottom:16px">
          <div class="config-field">
            <label>Mode <span class="help-icon" data-tooltip="PAPER: 모의매매 (실제 주문 없음)&#10;LIVE: 실거래 (업비트 실제 주문)" aria-label="Mode help"></span></label>
            <select class="select" id="scMode"><option value="PAPER" selected>PAPER</option><option value="LIVE">LIVE</option></select>
          </div>
          <div class="config-field">
            <label>Capital (KRW) <span class="help-icon" data-tooltip="오프닝 스캐너 전용 자본금(원화)입니다.&#10;메인 봇 자본금과 별도로 운용됩니다." aria-label="Capital help"></span></label>
            <input class="input" type="text" id="scCapital" value="100,000"/>
          </div>
          <div class="config-field">
            <label>Order Sizing <span class="help-icon" data-tooltip="PCT: 자본금 대비 비율(%)로 주문&#10;FIXED: 고정 금액(KRW)으로 주문" aria-label="Order sizing help"></span></label>
            <select class="select" id="scOrderMode"><option value="PCT" selected>PCT (%)</option><option value="FIXED">FIXED (KRW)</option></select>
          </div>
          <div class="config-field">
            <label>Order Value <span class="help-icon" data-tooltip="PCT 모드: 자본금의 N% (예: 30 = 30%)&#10;FIXED 모드: 고정 주문 금액(KRW)" aria-label="Order value help"></span></label>
            <input class="input" type="number" id="scOrderValue" value="30" step="1"/>
          </div>
        </div>

        <!-- Row 2: Timing -->
        <div style="font-size:12px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">Timing (KST)</div>
        <div class="config-bar" style="grid-template-columns:1fr 1fr 1fr 1fr 1fr;margin-bottom:16px">
          <div class="config-field">
            <label>Range Start <span class="help-icon" data-tooltip="오프닝 레인지 수집 시작 시각 (KST)&#10;이 시간부터 고가/저가를 추적합니다." aria-label="Range start help"></span></label>
            <input class="input" type="text" id="scRangeStart" value="08:00" placeholder="HH:MM"/>
          </div>
          <div class="config-field">
            <label>Range End <span class="help-icon" data-tooltip="오프닝 레인지 수집 종료 시각 (KST)&#10;이 시점까지의 고가/저가가 돌파 기준이 됩니다." aria-label="Range end help"></span></label>
            <input class="input" type="text" id="scRangeEnd" value="08:59" placeholder="HH:MM"/>
          </div>
          <div class="config-field">
            <label>Entry Start <span class="help-icon" data-tooltip="돌파 진입 허용 시작 시각 (KST)&#10;이 시간부터 매수 시그널을 실행합니다." aria-label="Entry start help"></span></label>
            <input class="input" type="text" id="scEntryStart" value="09:05" placeholder="HH:MM"/>
          </div>
          <div class="config-field">
            <label>Entry End <span class="help-icon" data-tooltip="돌파 진입 마감 시각 (KST)&#10;이후에는 새 진입을 차단합니다." aria-label="Entry end help"></span></label>
            <input class="input" type="text" id="scEntryEnd" value="10:30" placeholder="HH:MM"/>
          </div>
          <div class="config-field">
            <label>Session End <span class="help-icon" data-tooltip="강제 청산 시각 (KST)&#10;보유 중인 모든 포지션을 이 시간에 청산합니다." aria-label="Session end help"></span></label>
            <input class="input" type="text" id="scSessionEnd" value="12:00" placeholder="HH:MM"/>
          </div>
        </div>

        <!-- Row 3: Risk -->
        <div style="font-size:12px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">Risk</div>
        <div class="config-bar" style="grid-template-columns:1fr 1fr 1fr 1fr;margin-bottom:16px">
          <div class="config-field">
            <label>TP (ATR x) <span class="help-icon" data-tooltip="익절 목표 = ATR x 배수&#10;예: 1.2 = 현재 ATR의 1.2배 상승 시 익절" aria-label="TP help"></span></label>
            <input class="input" type="number" id="scTpAtr" value="1.2" step="0.1"/>
          </div>
          <div class="config-field">
            <label>SL (%) <span class="help-icon" data-tooltip="손절 한도 (진입가 대비 하락 %)&#10;예: 10 = -10% 하락 시 손절" aria-label="SL help"></span></label>
            <input class="input" type="number" id="scSlPct" value="10" step="0.5"/>
          </div>
          <div class="config-field">
            <label>Trail (ATR x) <span class="help-icon" data-tooltip="트레일링 스탑 = 고점 - ATR x 배수&#10;수익 구간에서 이익을 보호합니다." aria-label="Trail help"></span></label>
            <input class="input" type="number" id="scTrailAtr" value="0.8" step="0.1"/>
          </div>
          <div class="config-field">
            <label>Candle Interval <span class="help-icon" data-tooltip="분석에 사용하는 캔들 간격 (분)&#10;기본 5분봉 권장" aria-label="Candle help"></span></label>
            <select class="select" id="scCandleUnit">
              <option value="1">1min</option><option value="3">3min</option><option value="5" selected>5min</option><option value="10">10min</option><option value="15">15min</option>
            </select>
          </div>
        </div>

        <!-- Row 4: Scan/Filter -->
        <div style="font-size:12px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">Scan &amp; Filter</div>
        <div class="config-bar" style="grid-template-columns:1fr 1fr 1fr 1fr 1fr;margin-bottom:8px">
          <div class="config-field">
            <label>Top N <span class="help-icon" data-tooltip="거래대금 상위 N개 코인을 스캔합니다.&#10;매 틱마다 실시간 거래대금 기준으로 선정" aria-label="Top N help"></span></label>
            <input class="input" type="number" id="scTopN" value="15" min="1" max="50"/>
          </div>
          <div class="config-field">
            <label>Max Positions <span class="help-icon" data-tooltip="동시에 보유할 수 있는 최대 포지션 수&#10;초과 시 새 진입을 차단합니다." aria-label="Max positions help"></span></label>
            <input class="input" type="number" id="scMaxPos" value="3" min="1" max="15"/>
          </div>
          <div class="config-field">
            <label>BTC Filter <span class="help-icon" data-tooltip="BTC 방향 필터 (EMA 20 기준)&#10;ON: BTC가 EMA(20) 위일 때만 롱 진입" aria-label="BTC filter help"></span></label>
            <select class="select" id="scBtcFilter"><option value="true" selected>ON</option><option value="false">OFF</option></select>
          </div>
          <div class="config-field">
            <label>Volume Mult <span class="help-icon" data-tooltip="진입 조건: 현재 거래량 > 평균 x 배수&#10;예: 1.5 = 평균의 1.5배 이상 거래량 필요" aria-label="Volume mult help"></span></label>
            <input class="input" type="number" id="scVolMult" value="1.5" step="0.1"/>
          </div>
          <div class="config-field">
            <label>Min Body % <span class="help-icon" data-tooltip="진입 조건: 캔들 몸통 비율 최소값&#10;예: 0.40 = 전체 캔들 길이의 40% 이상 몸통" aria-label="Min body help"></span></label>
            <input class="input" type="number" id="scBodyRatio" value="0.40" step="0.05" min="0" max="1"/>
          </div>
        </div>
      </div>
    </div>

    <!-- ── Apply Button ── -->
    <div class="run-section" style="margin-top:32px;margin-bottom:0">
      <button class="run-btn" id="applyBtn">
        <span class="run-icon">&#x2714;</span>
        Apply Settings
      </button>
    </div>

  </div>
</main>

<!-- Strategy descriptions modal (? icon) -->
<div class="modal" id="strategyModal" aria-hidden="true">
  <div class="modal-backdrop" data-modal-close></div>
  <div class="modal-dialog" role="dialog" aria-modal="true" aria-labelledby="strategyModalTitle">
    <div class="modal-header">
      <div class="modal-title" id="strategyModalTitle">Strategy Descriptions</div>
      <button type="button" class="modal-close" aria-label="Close" data-modal-close>&times;</button>
    </div>
    <div class="modal-body" id="strategyModalBody"></div>
  </div>
</div>

<!-- Strategy detail settings modal (gear icon) -->
<div class="modal" id="stratDetailModal" aria-hidden="true">
  <div class="modal-backdrop" data-modal-close></div>
  <div class="modal-dialog" role="dialog" aria-modal="true" aria-labelledby="stratDetailTitle" style="max-width:600px">
    <div class="modal-header">
      <div class="modal-title" id="stratDetailTitle">&#x2699; 전략 상세 설정</div>
      <button type="button" class="modal-close" aria-label="Close" data-modal-close>&times;</button>
    </div>
    <div class="modal-body" id="stratDetailBody"></div>
    <div style="padding:12px 20px 16px;text-align:right;border-top:1px solid var(--border)">
      <button class="btn primary" id="sdSaveBtn" style="font-size:13px;padding:8px 24px">저장</button>
    </div>
  </div>
</div>

<!-- Mobile Bottom Nav -->
<nav class="mobile-nav">
  <a class="mobile-nav-item" th:href="@{/dashboard}"><span class="mnav-icon">&#x1F4CA;</span>대시보드</a>
  <a class="mobile-nav-item active" th:href="@{/settings}"><span class="mnav-icon">&#x2699;&#xFE0F;</span>설정</a>
  <a class="mobile-nav-item" th:href="@{/backtest}"><span class="mnav-icon">&#x1F9EA;</span>백테스트</a>
</nav>

<script th:src="@{/js/autotrade-common.js(v=20260316a)}"></script>
<script th:src="@{/js/settings.js(v=20260316a)}"></script>
</body>
</html>
